<script>
const actions = [
  "Take a 5-minute rest",
  "Drink water",
  "Take deep breaths",
  "Go for a short walk",
  "Do 10 jumping jacks",
  "Stretch your body"
];

function show(text, color) {
  document.getElementById("result").innerText = text;
  document.body.style.background = color;
}

function randomAction() {
  let random = actions[Math.floor(Math.random() * actions.length)];
  document.getElementById("result").innerText = random;
}
</script>

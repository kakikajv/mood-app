<!DOCTYPE html>
<html>
<head>
  <title>Mood App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #eef2ff;
      text-align: center;
    }

    h2 {
      margin-top: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
      max-width: 300px;
      margin: auto;
    }

    .mood {
  font-size: 40px;
  padding: 25px;
  background: white;
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.mood:active {
  transform: scale(0.9);
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

    #result {
  margin-top: 20px;
  font-size: 22px;
  font-weight: bold;
  opacity: 0;
  transition: opacity 0.3s ease;
}

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<h2>How do you feel?</h2>

<div class="grid">
  <div class="mood" onclick="show('Take a 5-minute rest','#dbeafe')">😴</div>
  <div class="mood" onclick="show('Drink water','#fee2e2')">😞</div>
  <div class="mood" onclick="show('Take deep breaths','#e0f2fe')">😵</div>
  <div class="mood" onclick="show('Sit quietly for 2 minutes','#dcfce7')">😌</div>
  <div class="mood" onclick="show('Do 10 jumping jacks','#fef3c7')">🤩</div>
  <div class="mood" onclick="show('Go for a short walk','#fecaca')">😡</div>
</div>

<div id="result"></div>

<button onclick="randomAction()">🎲 Random Action</button>
<br>
<button onclick="done()">✅ Done</button>

<script>
const actions = [
  "Take a 5-minute rest",
  "Drink water",
  "Take deep breaths",
  "Go for a short walk",
  "Do 10 jumping jacks",
  "Stretch your body"
];

function show(text, color) {
  let result = document.getElementById("result");

  result.style.opacity = 0;

  setTimeout(() => {
    result.innerText = text;
    result.style.opacity = 1;
  }, 100);

  document.body.style.background = color;
}

function randomAction() {
  let result = document.getElementById("result");
  let random = actions[Math.floor(Math.random() * actions.length)];

  result.style.opacity = 0;

  setTimeout(() => {
    result.innerText = random;
    result.style.opacity = 1;
  }, 100);
}

function done() {
  document.getElementById("result").innerText = "Nice. That's enough for now ✨";
}
</script>

</body>
</html>
